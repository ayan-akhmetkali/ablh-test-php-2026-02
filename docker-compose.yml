services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ablh_app
    command: >
      sh -lc "mkdir -p /var/www/html/var/cache /var/www/html/var/templates_c
      && chown -R www-data:www-data /var/www/html/var
      && php-fpm"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: abelohost_blog
      DB_USER: root
      DB_PASSWORD: root

  nginx:
    image: nginx:1.27-alpine
    container_name: ablh_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: ablh_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: abelohost_blog
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  db_data:
